services:
  postgres:
    image: postgres:17-alpine
    container_name: myrati-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myrati}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - myrati-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-myrati}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  postgres-backup:
    build:
      context: .
      dockerfile: ./deploy/Dockerfile.backup
    container_name: myrati-postgres-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-myrati}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKUP_INTERVAL_SECONDS: ${MYRATI_BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${MYRATI_BACKUP_RETENTION_DAYS:-7}
      BACKUP_FILE_PREFIX: ${MYRATI_BACKUP_FILE_PREFIX:-myrati}
      BACKUP_COMPRESSION: ${MYRATI_BACKUP_COMPRESSION:-gzip:level=6}
      BACKUP_ENCRYPTION_CIPHER: ${MYRATI_BACKUP_ENCRYPTION_CIPHER:-aes-256-cbc}
      BACKUP_ENCRYPTION_ITERATIONS: ${MYRATI_BACKUP_ENCRYPTION_ITERATIONS:-250000}
      BACKUP_ENCRYPTION_PASSPHRASE: ${MYRATI_BACKUP_ENCRYPTION_PASSPHRASE:-}
      R2_ENDPOINT: ${MYRATI_R2_ENDPOINT:-}
      R2_BUCKET_NAME: ${MYRATI_R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${MYRATI_R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${MYRATI_R2_SECRET_ACCESS_KEY:-}
      R2_OBJECT_PREFIX: ${MYRATI_R2_OBJECT_PREFIX:-postgres}
      R2_DAILY_RETENTION: ${MYRATI_R2_DAILY_RETENTION:-35}
      R2_MONTHLY_RETENTION: ${MYRATI_R2_MONTHLY_RETENTION:-12}
      R2_YEARLY_RETENTION: ${MYRATI_R2_YEARLY_RETENTION:-6}
    volumes:
      - myrati-postgres-backups:/backups

  backoffice-service:
    build:
      context: .
      dockerfile: ./src/ServiceHost.Dockerfile
      args:
        SERVICE_PROJECT: src/Myrati.BackofficeService.API/Myrati.BackofficeService.API.csproj
        SERVICE_DLL: Myrati.BackofficeService.API.dll
    container_name: myrati-backoffice-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MyratiDb: ${MYRATI_DB_CONNECTION:-Host=postgres;Port=5432;Database=myrati;Username=postgres;Password=postgres}
      Jwt__Issuer: ${MYRATI_JWT_ISSUER:-Myrati}
      Jwt__Audience: ${MYRATI_JWT_AUDIENCE:-Myrati.Backoffice}
      Jwt__Key: ${MYRATI_JWT_KEY:-CHANGE_THIS_FOR_A_LONG_RANDOM_SECRET_KEY_32+}
      Email__FrontendBaseUrl: ${MYRATI_EMAIL_FRONTEND_URL:-http://localhost:4173}
      Email__SenderName: ${MYRATI_EMAIL_SENDER_NAME:-Myrati}
      Email__SenderEmail: ${MYRATI_EMAIL_SENDER_ADDRESS:-}
      Email__Gmail__ClientId: ${MYRATI_GMAIL_CLIENT_ID:-}
      Email__Gmail__ClientSecret: ${MYRATI_GMAIL_CLIENT_SECRET:-}
      Email__Gmail__RefreshToken: ${MYRATI_GMAIL_REFRESH_TOKEN:-}
      Audit__RetentionDays: ${MYRATI_AUDIT_RETENTION_DAYS:-365}
      Compliance__DataSubjectRequestDueDays: ${MYRATI_COMPLIANCE_DATA_SUBJECT_REQUEST_DUE_DAYS:-15}
      MYRATI_APP_TIMEZONE: ${MYRATI_APP_TIMEZONE:-America/Sao_Paulo}
      DataProtection__ApplicationName: ${MYRATI_DATAPROTECTION_APPLICATION_NAME:-Myrati}
      DataProtection__KeysPath: ${MYRATI_DATAPROTECTION_KEYS_PATH:-/var/lib/myrati/dataprotection-keys}
      DataProtection__CertificatePath: ${MYRATI_DATAPROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${MYRATI_DATAPROTECTION_CERTIFICATE_PASSWORD:-}
    volumes:
      - myrati-dataprotection-keys:/var/lib/myrati/dataprotection-keys
    ports:
      - "${MYRATI_BACKOFFICE_SERVICE_PORT:-5120}:8080"

  identity-service:
    build:
      context: .
      dockerfile: ./src/ServiceHost.Dockerfile
      args:
        SERVICE_PROJECT: src/Myrati.IdentityService.API/Myrati.IdentityService.API.csproj
        SERVICE_DLL: Myrati.IdentityService.API.dll
    container_name: myrati-identity-service
    depends_on:
      postgres:
        condition: service_healthy
      backoffice-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MyratiDb: ${MYRATI_DB_CONNECTION:-Host=postgres;Port=5432;Database=myrati;Username=postgres;Password=postgres}
      Jwt__Issuer: ${MYRATI_JWT_ISSUER:-Myrati}
      Jwt__Audience: ${MYRATI_JWT_AUDIENCE:-Myrati.Backoffice}
      Jwt__Key: ${MYRATI_JWT_KEY:-CHANGE_THIS_FOR_A_LONG_RANDOM_SECRET_KEY_32+}
      Email__FrontendBaseUrl: ${MYRATI_EMAIL_FRONTEND_URL:-http://localhost:4173}
      Email__SenderName: ${MYRATI_EMAIL_SENDER_NAME:-Myrati}
      Email__SenderEmail: ${MYRATI_EMAIL_SENDER_ADDRESS:-}
      Email__Gmail__ClientId: ${MYRATI_GMAIL_CLIENT_ID:-}
      Email__Gmail__ClientSecret: ${MYRATI_GMAIL_CLIENT_SECRET:-}
      Email__Gmail__RefreshToken: ${MYRATI_GMAIL_REFRESH_TOKEN:-}
      Audit__RetentionDays: ${MYRATI_AUDIT_RETENTION_DAYS:-365}
      MYRATI_APP_TIMEZONE: ${MYRATI_APP_TIMEZONE:-America/Sao_Paulo}
      DataProtection__ApplicationName: ${MYRATI_DATAPROTECTION_APPLICATION_NAME:-Myrati}
      DataProtection__KeysPath: ${MYRATI_DATAPROTECTION_KEYS_PATH:-/var/lib/myrati/dataprotection-keys}
      DataProtection__CertificatePath: ${MYRATI_DATAPROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${MYRATI_DATAPROTECTION_CERTIFICATE_PASSWORD:-}
    volumes:
      - myrati-dataprotection-keys:/var/lib/myrati/dataprotection-keys
    ports:
      - "${MYRATI_IDENTITY_SERVICE_PORT:-5119}:8080"

  public-service:
    build:
      context: .
      dockerfile: ./src/ServiceHost.Dockerfile
      args:
        SERVICE_PROJECT: src/Myrati.PublicService.API/Myrati.PublicService.API.csproj
        SERVICE_DLL: Myrati.PublicService.API.dll
    container_name: myrati-public-service
    depends_on:
      postgres:
        condition: service_healthy
      backoffice-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MyratiDb: ${MYRATI_DB_CONNECTION:-Host=postgres;Port=5432;Database=myrati;Username=postgres;Password=postgres}
      Jwt__Issuer: ${MYRATI_JWT_ISSUER:-Myrati}
      Jwt__Audience: ${MYRATI_JWT_AUDIENCE:-Myrati.Backoffice}
      Jwt__Key: ${MYRATI_JWT_KEY:-CHANGE_THIS_FOR_A_LONG_RANDOM_SECRET_KEY_32+}
      Email__FrontendBaseUrl: ${MYRATI_EMAIL_FRONTEND_URL:-http://localhost:4173}
      Email__SenderName: ${MYRATI_EMAIL_SENDER_NAME:-Myrati}
      Email__SenderEmail: ${MYRATI_EMAIL_SENDER_ADDRESS:-}
      Email__LeadRecipientName: ${MYRATI_EMAIL_LEAD_RECIPIENT_NAME:-Yasmin}
      Email__LeadRecipientEmail: ${MYRATI_EMAIL_LEAD_RECIPIENT_ADDRESS:-yasmin@myrati.com.br}
      Email__Gmail__ClientId: ${MYRATI_GMAIL_CLIENT_ID:-}
      Email__Gmail__ClientSecret: ${MYRATI_GMAIL_CLIENT_SECRET:-}
      Email__Gmail__RefreshToken: ${MYRATI_GMAIL_REFRESH_TOKEN:-}
      Audit__RetentionDays: ${MYRATI_AUDIT_RETENTION_DAYS:-365}
      MYRATI_APP_TIMEZONE: ${MYRATI_APP_TIMEZONE:-America/Sao_Paulo}
      SystemStatus__Monitor__Enabled: ${MYRATI_STATUS_MONITOR_ENABLED:-true}
      SystemStatus__Monitor__IntervalSeconds: ${MYRATI_STATUS_MONITOR_INTERVAL_SECONDS:-15}
      SystemStatus__Monitor__RequestTimeoutSeconds: ${MYRATI_STATUS_MONITOR_TIMEOUT_SECONDS:-5}
      SystemStatus__Monitor__DegradedResponseTimeMs: ${MYRATI_STATUS_MONITOR_DEGRADED_MS:-1200}
      SystemStatus__Monitor__Components__0__Id: ${MYRATI_STATUS_COMPONENT_0_ID:-STS-API}
      SystemStatus__Monitor__Components__0__Name: ${MYRATI_STATUS_COMPONENT_0_NAME:-API Gateway}
      SystemStatus__Monitor__Components__0__Url: ${MYRATI_STATUS_COMPONENT_0_URL:-http://gateway:8080/health}
      SystemStatus__Monitor__Components__0__SortOrder: ${MYRATI_STATUS_COMPONENT_0_SORT_ORDER:-1}
      SystemStatus__Monitor__Components__1__Id: ${MYRATI_STATUS_COMPONENT_1_ID:-STS-IDENTITY}
      SystemStatus__Monitor__Components__1__Name: ${MYRATI_STATUS_COMPONENT_1_NAME:-Autenticação}
      SystemStatus__Monitor__Components__1__Url: ${MYRATI_STATUS_COMPONENT_1_URL:-http://identity-service:8080/health}
      SystemStatus__Monitor__Components__1__SortOrder: ${MYRATI_STATUS_COMPONENT_1_SORT_ORDER:-2}
      SystemStatus__Monitor__Components__2__Id: ${MYRATI_STATUS_COMPONENT_2_ID:-STS-BACKOFFICE}
      SystemStatus__Monitor__Components__2__Name: ${MYRATI_STATUS_COMPONENT_2_NAME:-Backoffice}
      SystemStatus__Monitor__Components__2__Url: ${MYRATI_STATUS_COMPONENT_2_URL:-http://backoffice-service:8080/health}
      SystemStatus__Monitor__Components__2__SortOrder: ${MYRATI_STATUS_COMPONENT_2_SORT_ORDER:-3}
      SystemStatus__Monitor__Components__3__Id: ${MYRATI_STATUS_COMPONENT_3_ID:-STS-PUBLIC}
      SystemStatus__Monitor__Components__3__Name: ${MYRATI_STATUS_COMPONENT_3_NAME:-Site Público}
      SystemStatus__Monitor__Components__3__Url: ${MYRATI_STATUS_COMPONENT_3_URL:-http://public-service:8080/health}
      SystemStatus__Monitor__Components__3__SortOrder: ${MYRATI_STATUS_COMPONENT_3_SORT_ORDER:-4}
      SystemStatus__Monitor__Components__4__Id: ${MYRATI_STATUS_COMPONENT_4_ID:-STS-NOTIFICATION}
      SystemStatus__Monitor__Components__4__Name: ${MYRATI_STATUS_COMPONENT_4_NAME:-Notificações}
      SystemStatus__Monitor__Components__4__Url: ${MYRATI_STATUS_COMPONENT_4_URL:-http://notification-service:8080/health}
      SystemStatus__Monitor__Components__4__SortOrder: ${MYRATI_STATUS_COMPONENT_4_SORT_ORDER:-5}
      DataProtection__ApplicationName: ${MYRATI_DATAPROTECTION_APPLICATION_NAME:-Myrati}
      DataProtection__KeysPath: ${MYRATI_DATAPROTECTION_KEYS_PATH:-/var/lib/myrati/dataprotection-keys}
      DataProtection__CertificatePath: ${MYRATI_DATAPROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${MYRATI_DATAPROTECTION_CERTIFICATE_PASSWORD:-}
    volumes:
      - myrati-dataprotection-keys:/var/lib/myrati/dataprotection-keys
    ports:
      - "${MYRATI_PUBLIC_SERVICE_PORT:-5121}:8080"

  notification-service:
    build:
      context: .
      dockerfile: ./src/ServiceHost.Dockerfile
      args:
        SERVICE_PROJECT: src/Myrati.NotificationService.API/Myrati.NotificationService.API.csproj
        SERVICE_DLL: Myrati.NotificationService.API.dll
    container_name: myrati-notification-service
    depends_on:
      postgres:
        condition: service_healthy
      backoffice-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MyratiDb: ${MYRATI_DB_CONNECTION:-Host=postgres;Port=5432;Database=myrati;Username=postgres;Password=postgres}
      Jwt__Issuer: ${MYRATI_JWT_ISSUER:-Myrati}
      Jwt__Audience: ${MYRATI_JWT_AUDIENCE:-Myrati.Backoffice}
      Jwt__Key: ${MYRATI_JWT_KEY:-CHANGE_THIS_FOR_A_LONG_RANDOM_SECRET_KEY_32+}
      Audit__RetentionDays: ${MYRATI_AUDIT_RETENTION_DAYS:-365}
      MYRATI_APP_TIMEZONE: ${MYRATI_APP_TIMEZONE:-America/Sao_Paulo}
      DataProtection__ApplicationName: ${MYRATI_DATAPROTECTION_APPLICATION_NAME:-Myrati}
      DataProtection__KeysPath: ${MYRATI_DATAPROTECTION_KEYS_PATH:-/var/lib/myrati/dataprotection-keys}
      DataProtection__CertificatePath: ${MYRATI_DATAPROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${MYRATI_DATAPROTECTION_CERTIFICATE_PASSWORD:-}
    volumes:
      - myrati-dataprotection-keys:/var/lib/myrati/dataprotection-keys
    ports:
      - "${MYRATI_NOTIFICATION_SERVICE_PORT:-5122}:8080"

  gateway:
    build:
      context: .
      dockerfile: ./src/ServiceHost.Dockerfile
      args:
        SERVICE_PROJECT: src/Myrati.Gateway.API/Myrati.Gateway.API.csproj
        SERVICE_DLL: Myrati.Gateway.API.dll
    container_name: myrati-gateway
    depends_on:
      - identity-service
      - backoffice-service
      - notification-service
      - public-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ReverseProxy__Clusters__identityService__Destinations__destination1__Address: http://identity-service:8080/
      ReverseProxy__Clusters__backofficeService__Destinations__destination1__Address: http://backoffice-service:8080/
      ReverseProxy__Clusters__notificationService__Destinations__destination1__Address: http://notification-service:8080/
      ReverseProxy__Clusters__publicService__Destinations__destination1__Address: http://public-service:8080/
      DataProtection__ApplicationName: ${MYRATI_DATAPROTECTION_APPLICATION_NAME:-Myrati}
      DataProtection__KeysPath: ${MYRATI_DATAPROTECTION_KEYS_PATH:-/var/lib/myrati/dataprotection-keys}
      DataProtection__CertificatePath: ${MYRATI_DATAPROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${MYRATI_DATAPROTECTION_CERTIFICATE_PASSWORD:-}
    volumes:
      - myrati-dataprotection-keys:/var/lib/myrati/dataprotection-keys
    ports:
      - "${MYRATI_GATEWAY_PORT:-5118}:8080"

volumes:
  myrati-postgres-data:
  myrati-postgres-backups:
  myrati-dataprotection-keys:
